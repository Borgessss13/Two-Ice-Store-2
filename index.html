<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Camisolas Yupoo</title>
    <!-- Tailwind CSS para o design -->
    <script src="https://tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#0a0a0a', card: '#141414', accent: '#00df89' }
                }
            }
        }
    </script>
    <!-- React via CDN para a navegação sem Node.js -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-dark text-gray-100 font-sans select-none">
    <div id="root"></div>

    <script type="text/babel">
        // A sua base de dados simulada com os links do Yupoo
        const data = {
          ligas: [
            {
              id: "premier-league",
              nome: "Premier League",
              imagem: "https://unsplash.com",
              clubes: [
                {
                  id: "arsenal",
                  nome: "Arsenal",
                  logo: "https://unsplash.com",
                  camisolas: [
                    { id: "ars-home", nome: "Arsenal Home 25/26", imagem: "https://unsplash.com", epoca: "2025/26", tipo: "Fan", yupoo: "https://yupoo.com" }
                  ]
                }
              ]
            },
            {
              id: "primeira-liga",
              nome: "Primeira Liga",
              imagem: "https://unsplash.com",
              clubes: [
                {
                  id: "benfica",
                  nome: "Benfica",
                  logo: "https://unsplash.com",
                  camisolas: [
                    { id: "slb-home", nome: "Benfica Home 25/26", imagem: "https://unsplash.com", epoca: "2025/26", tipo: "Player", yupoo: "https://yupoo.com" }
                  ]
                }
              ]
            }
          ]
        };

        function App() {
            const [view, setView] = React.useState({ page: 'ligas', ligaId: null, clubeId: null });

            return (
                <div className="min-h-screen bg-dark pb-12">
                    <header className="border-b border-gray-800 bg-black/60 sticky top-0 z-50 backdrop-blur-md">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <button onClick={() => setView({ page: 'ligas' })} className="text-xl font-extrabold text-accent">YUPOO CATÁLOGO</button>
                            <span className="text-xs text-gray-400">Modo Estático</span>
                        </div>
                    </header>
                    
                    <main className="max-w-6xl mx-auto px-4 mt-8">
                        {/* 1. ECRÃ DE LIGAS */}
                        {view.page === 'ligas' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6">Ligas Disponíveis</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {data.ligas.map(liga => (
                                        <div key={liga.id} onClick={() => setView({ page: 'clubes', ligaId: liga.id })} className="cursor-pointer group bg-card border border-gray-900 rounded-xl overflow-hidden hover:border-accent/40 transition">
                                            <div className="h-44 relative">
                                                <img src={liga.imagem} className="w-full h-full object-cover opacity-50 group-hover:scale-105 transition duration-500" />
                                                <h3 className="absolute bottom-4 left-4 text-2xl font-black uppercase tracking-wide">{liga.nome}</h3>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 2. ECRÃ DE CLUBES */}
                        {view.page === 'clubes' && (
                            <div>
                                <button onClick={() => setView({ page: 'ligas' })} className="mb-6 text-sm text-gray-400 hover:text-white transition">← Voltar para Ligas</button>
                                <h2 className="text-2xl font-bold mb-6 uppercase">Clubes</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {data.ligas.find(l => l.id === view.ligaId)?.clubes.map(clube => (
                                        <div key={clube.id} onClick={() => setView({ page: 'camisolas', ligaId: view.ligaId, clubeId: clube.id })} className="cursor-pointer bg-card border border-gray-900 hover:border-accent p-6 rounded-xl text-center transition">
                                            <img src={clube.logo} className="w-16 h-16 mx-auto mb-4 object-cover rounded-full bg-black p-1" />
                                            <span className="font-bold">{clube.nome}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 3. ECRÃ DE CAMISOLAS */}
                        {view.page === 'camisolas' && (
                            <div>
                                <button onClick={() => setView({ page: 'clubes', ligaId: view.ligaId })} className="mb-6 text-sm text-gray-400 hover:text-white transition">← Voltar para Clubes</button>
                                <h2 className="text-2xl font-bold mb-6 uppercase">Camisolas</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {data.ligas.find(l => l.id === view.ligaId)?.clubes.find(c => c.id === view.clubeId)?.camisolas.map(cami => (
                                        <div key={cami.id} className="bg-card border border-gray-900 rounded-xl overflow-hidden hover:border-gray-700 transition">
                                            <div className="h-64 overflow-hidden">
                                                <img src={cami.imagem} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="p-5">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-xs bg-gray-800 px-2 py-1 rounded text-gray-300 font-medium">{cami.epoca}</span>
                                                    <span className="text-xs bg-accent/20 border border-accent/20 px-2 py-1 rounded text-accent font-medium">{cami.tipo}</span>
                                                </div>
                                                <h3 className="font-bold text-lg mb-4">{cami.nome}</h3>
                                                <a href={cami.yupoo} target="_blank" rel="noopener noreferrer" className="block text-center bg-accent text-black font-extrabold py-3 rounded-lg text-sm uppercase tracking-wide hover:bg-accent/80 transition">
                                                    Ver no Yupoo
                                                </a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
