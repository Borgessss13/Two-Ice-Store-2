<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Camisolas de Futebol</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">

    const catalog = [
      {
        league: "Premier League",
        clubs: [
          {
            name: "Manchester United",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              },
              {
                title: "Away 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          },
          {
            name: "Liverpool",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          }
        ]
      },

      {
        league: "La Liga",
        clubs: [
          {
            name: "Real Madrid",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          },
          {
            name: "Barcelona",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          }
        ]
      },

      {
        league: "Serie A",
        clubs: [
          {
            name: "Juventus",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          }
        ]
      },

      {
        league: "Bundesliga",
        clubs: [
          {
            name: "Bayern Munique",
            shirts: [
              {
                title: "Home 2024",
                image: "https://liuenen1368.x.yupoo.com/path-to-image.jpg"
              }
            ]
          }
        ]
      }
    ];

    function App() {
      const [search, setSearch] = React.useState("");

      const filtered = catalog.map(league => ({
        ...league,
        clubs: league.clubs.filter(club =>
          club.name.toLowerCase().includes(search.toLowerCase())
        )
      }));

      return (
        <div className="p-6">
          <h1 className="text-3xl font-bold text-center mb-6">
            Catálogo de Camisolas de Futebol
          </h1>

          <div className="max-w-md mx-auto mb-6">
            <input
              className="w-full p-2 border rounded"
              placeholder="Pesquisar clube..."
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
          </div>

          <div className="space-y-10">
            {filtered.map((league, i) => (
              <div key={i}>
                <h2 className="text-2xl font-bold mb-4">{league.league}</h2>

                <div className="space-y-6">
                  {league.clubs.map((club, j) => (
                    <div key={j} className="bg-white p-4 rounded shadow">
                      <h3 className="text-xl font-semibold mb-3">
                        {club.name}
                      </h3>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {club.shirts.map((shirt, k) => (
                          <div key={k} className="border rounded p-2">
                            <img
                              src={shirt.image}
                              className="w-full h-48 object-cover rounded"
                            />
                            <p className="text-center mt-2">
                              {shirt.title}
                            </p>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
